<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<!-- Head reutilizable -->
<head th:replace="~{fragments/layout :: head('Editar Almacén')}"></head>
<body>

<div class="layout">
    <!-- Sidebar de navegación -->
    <th:block th:replace="~{fragments/layout :: sidebar('almacenes')}"/>

    <!-- Contenido principal -->
    <main class="main">
        <th:block th:replace="~{fragments/layout :: headerPagina('Editar Almacén', 'Modifica los datos del almacén', '/almacenes', '← Volver')}"/>


        <!-- Mensaje de error -->
        <div th:if="${error}" class="alert-error">
            <p th:text="${error}"></p>
        </div>

        <div class="form-container">
            <form th:action="@{/almacenes/actualizar/{id}(id=${almacen.id})}" method="post">

                <div class="form-row">
                    <div class="form-group">
                        <label for="nombre">Nombre <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre"
                               th:value="${almacen.nombre}"
                               maxlength="100" required>
                    </div>
                    <div class="form-group">
                        <label for="codigo">Código</label>
                        <input type="text" id="codigo"
                               th:value="${almacen.codigo}"
                               maxlength="20" disabled>
                        <small>El código no puede modificarse.</small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="responsable">Responsable</label>
                        <input type="text" id="responsable" name="responsable"
                               th:value="${almacen.responsable}"
                               placeholder="Nombre del responsable"
                               maxlength="120">
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" id="telefono" name="telefono"
                               th:value="${almacen.telefono}"
                               placeholder="Teléfono de contacto"
                               maxlength="20">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="capacidad">Capacidad</label>
                        <input type="number" id="capacidad" name="capacidad"
                               th:value="${almacen.capacidad}"
                               placeholder="Capacidad máxima"
                               step="0.01" min="0">
                    </div>
                    <div class="form-group">
                        <!-- espacio reservado -->
                    </div>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección</label>
                    <textarea id="direccion" name="direccion"
                              placeholder="Dirección del almacén"
                              rows="2"
                              th:text="${almacen.direccion}"></textarea>
                </div>

                <div class="form-group">
                    <label for="notas">Notas</label>
                    <textarea id="notas" name="notas"
                              placeholder="Observaciones o notas adicionales"
                              rows="3"
                              th:text="${almacen.notas}"></textarea>
                </div>

                <div class="form-actions">
                    <a href="/almacenes" class="btn-cancelar">Cancelar</a>
                    <button type="submit" class="btn-guardar">Actualizar Almacén</button>
                </div>

            </form>
        </div>
    </main>
</div>

<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>

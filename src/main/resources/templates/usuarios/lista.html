<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Usuarios')}"></head>
<body>
<div class="layout">
    <th:block th:replace="~{fragments/layout :: sidebar('usuarios')}"/>
    <main class="main">
        <th:block th:replace="~{fragments/layout :: headerPagina('Gestión de Usuarios', 'Administra los usuarios del sistema', '/usuarios/nuevo', '+ Nuevo Usuario')}"/>

        <h3 class="section-title">Usuarios Activos</h3>
        <div class="table-container">
            <table class="tabla">
                <thead>
                <tr>
                    <th>#</th><th>Nombre completo</th><th>Username</th>
                    <th>Email</th><th>Documento</th><th>Rol</th><th>Estado</th><th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${usuarios}">
                    <td th:text="${usuario.id}"></td>
                    <td th:text="${usuario.nombreCompleto}"></td>
                    <td th:text="${usuario.username}"></td>
                    <td th:text="${usuario.email}"></td>
                    <td th:text="${usuario.tipoDocumento.codigo + ' ' + usuario.numeroDocumento}"></td>
                    <td><span class="badge-rol" th:text="${usuario.rol.nombre}"></span></td>
                    <td><span class="badge-activo">Activo</span></td>
                    <td class="acciones">
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn-editar">Editar</a>
                        <a th:href="@{/usuarios/desactivar/{id}(id=${usuario.id})}" class="btn-desactivar"
                           onclick="return confirm('¿Desactivar este usuario?')">Desactivar</a>
                        <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" class="btn-eliminar"
                           onclick="return confirm('¿Eliminar permanentemente? Esta acción no se puede deshacer.')">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <h3 class="section-title" style="margin-top: 32px;">Usuarios Inactivos</h3>
        <div class="table-container">
            <table class="tabla">
                <thead>
                <tr>
                    <th>#</th><th>Nombre completo</th><th>Username</th>
                    <th>Email</th><th>Documento</th><th>Rol</th><th>Estado</th><th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario : ${inactivos}">
                    <td th:text="${usuario.id}"></td>
                    <td th:text="${usuario.nombreCompleto}"></td>
                    <td th:text="${usuario.username}"></td>
                    <td th:text="${usuario.email}"></td>
                    <td th:text="${usuario.tipoDocumento.codigo + ' ' + usuario.numeroDocumento}"></td>
                    <td><span class="badge-rol" th:text="${usuario.rol.nombre}"></span></td>
                    <td><span class="badge-inactivo">Inactivo</span></td>
                    <td class="acciones">
                        <a th:href="@{/usuarios/reactivar/{id}(id=${usuario.id})}" class="btn-reactivar"
                           onclick="return confirm('¿Reactivar este usuario?')">Reactivar</a>
                        <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}" class="btn-eliminar"
                           onclick="return confirm('¿Eliminar permanentemente? Esta acción no se puede deshacer.')">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>

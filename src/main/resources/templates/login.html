<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SofInventory - Acceso Seguro</title>
    <!-- Icono y estilos -->
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<!-- ==================== LOGIN ==================== -->
<!-- Formulario de autenticación de usuarios -->
<div class="container">
    <div class="card">
        <div class="logo-wrapper">
            <!-- Logo del sistema -->
            <img th:src="@{/img/logo-loginB.jpg}" alt="SofInventory Tech" class="login-logo">
        </div>
        //<!-- Formulario -->
        <form th:action="@{/auth/login}" method="post">
            <div class="input-group">
                <label for="username">Usuario del Sistema</label>
                <input type="text" id="username" name="username" placeholder="Usuario" required />
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required />
            </div>
            <!-- Mensaje de error -->
            <div th:if="${error}" class="error-msg">
                <p th:text="${error}"></p>
            </div>

            <button type="submit" class="btn-login">INICIAR SESIÓN</button>
        </form>
    </div>
</div>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
